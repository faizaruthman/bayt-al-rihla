    fmtBar.style.display = 'none';
    fmtBar.innerHTML =
      '<button type="button" class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>' +
      '<button type="button" class="fmt-btn" data-cmd="italic" title="Italic"><i>i</i></button>' +
      '<span class="fmt-sep"></span>' +
      '<span class="hl-swatches">' + hlSwatchHTML() + '</span>';
    document.body.appendChild(fmtBar);

    fmtBar.addEventListener('mousedown', e => e.preventDefault());   // keep the text selection
    fmtBar.querySelectorAll('.fmt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cmd = btn.dataset.cmd;
        if (cmd === 'bold' || cmd === 'italic') document.execCommand(cmd, false, null);
        if (activeRich) activeRich.focus();
        if (activeRichSync) activeRichSync();
        positionFmtBar();
      });
    });
    fmtBar.querySelectorAll('.hl-swatch').forEach(sw => {
      sw.addEventListener('click', () => applyHL(sw.dataset.hl));
    });

    function selectionInRich() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      const range = sel.getRangeAt(0);
      let node = range.commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentNode;
      const rich = node && node.closest ? node.closest('.editor-rich') : null;
      return rich ? { sel, range } : null;
    }

    /* the highlight colour at the current selection, or null */
    function currentHLColor() {
      const ctx = selectionInRich(); if (!ctx) return null;
      let node = ctx.range.commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentNode;
      const mark = node.closest ? node.closest('mark') : null;
      if (!mark) return null;
      const m = (mark.className || '').match(/hl-(\w+)/);
      return m ? m[1] : 'blue';
    }

    /* unwrap the <mark> sitting at a collapsed caret (clear w/o a selection) */
    function clearHighlightAtCaret() {
      const ctx = selectionInRich(); if (!ctx) return;
      let node = ctx.range.commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentNode;
      const mark = node.closest ? node.closest('mark') : null;
      if (!mark) return;
      const parent = mark.parentNode;
      while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
      parent.removeChild(mark); parent.normalize();
    }

    /* set (or clear) the highlight colour on the current selection */
    function setHighlight(colorKey) {
      const ctx = selectionInRich(); if (!ctx) return;
      const sel = ctx.sel, range = ctx.range;
      if (sel.isCollapsed) { if (colorKey === 'none') clearHighlightAtCaret(); return; }

      // 1) clear any highlight that overlaps the selection. Unwrapping moves the
      //    existing text nodes up (identity preserved), so the live range stays
      //    valid — don't normalise yet or the offsets would shift.
      Array.from(activeRich.querySelectorAll('mark'))
        .filter(m => range.intersectsNode(m))
        .forEach(m => m.replaceWith(...m.childNodes));

      if (colorKey === 'none') { activeRich.normalize(); return; }

      // 2) wrap the (now unhighlighted) selection in a single fresh mark
      const frag = range.extractContents();
      const mark = document.createElement('mark');
      mark.className = 'hl hl-' + colorKey;
      mark.appendChild(frag);
      range.insertNode(mark);

      // 3) reselect the new highlight and tidy up
      sel.removeAllRanges();
      const r = document.createRange();
      r.selectNodeContents(mark);
      sel.addRange(r);
      activeRich.normalize();
    }

    /* apply a highlight colour from either toolbar */
    function applyHL(colorKey) {
      if (!activeRich) return;
      setHighlight(colorKey);
      activeRich.focus();
      if (activeRichSync) activeRichSync();
      positionFmtBar();
    }

    function updateFmtState() {
      let b = false, i = false;
      try { b = document.queryCommandState('bold'); i = document.queryCommandState('italic'); } catch (e) {}
      const bb = fmtBar.querySelector('[data-cmd="bold"]');
      const ib = fmtBar.querySelector('[data-cmd="italic"]');
      if (bb) bb.classList.toggle('active', b);
      if (ib) ib.classList.toggle('active', i);
      const color = currentHLColor();
      document.querySelectorAll('.hl-swatch').forEach(sw =>
        sw.classList.toggle('active', sw.dataset.hl === color));
    }

    function positionFmtBar() {
      const ctx = selectionInRich();
      if (!ctx || ctx.sel.isCollapsed) { fmtBar.style.display = 'none'; return; }
      const rect = ctx.range.getBoundingClientRect();
      if (!rect || (rect.width === 0 && rect.height === 0)) { fmtBar.style.display = 'none'; return; }
      fmtBar.style.display = 'flex';
      const bb = fmtBar.getBoundingClientRect();
      let top  = rect.top + window.scrollY - bb.height - 8;
      let left = rect.left + window.scrollX + rect.width / 2 - bb.width / 2;
      const maxLeft = window.scrollX + document.documentElement.clientWidth - bb.width - 8;
      left = Math.max(window.scrollX + 8, Math.min(left, maxLeft));
      if (top < window.scrollY + 4) top = rect.bottom + window.scrollY + 8;   // flip below if no room above
      fmtBar.style.top = top + 'px';
      fmtBar.style.left = left + 'px';
      updateFmtState();
    }

    let fmtRAF = null;
    document.addEventListener('selectionchange', () => {
      if (fmtRAF) cancelAnimationFrame(fmtRAF);
      fmtRAF = requestAnimationFrame(positionFmtBar);
    });
    window.addEventListener('scroll', () => { if (fmtBar.style.display !== 'none') positionFmtBar(); }, true);
    window.addEventListener('resize', () => { if (fmtBar.style.display !== 'none') positionFmtBar(); });
    document.addEventListener('mousedown', e => {
      if (e.target.closest('.fmt-toolbar') || e.target.closest('.editor-rich')) return;
      fmtBar.style.display = 'none';
    });

    /* ══════════════════════════════════════════════════════════════════
       AUTH (Supabase email + password)
       ------------------------------------------------------------------
       Only a signed-in user can write (enforced by Row Level Security on
       the database). The session is persisted by the Supabase client
       across refreshes automatically.
    ══════════════════════════════════════════════════════════════════ */
    function showGate() {
      document.getElementById('adminGate').classList.add('show');
      document.getElementById('adminApp').classList.remove('show');
      setTimeout(() => { const i = document.getElementById('gateEmail'); if (i) i.focus(); }, 50);
    }
    function showApp() {
      document.getElementById('adminGate').classList.remove('show');
      document.getElementById('adminApp').classList.add('show');
      const u = document.getElementById('adminUser');
      if (u && authSession && authSession.user) { u.hidden = false; u.textContent = '✓ ' + authSession.user.email; }
      renderAdmin();
    }
    /* show the right screen based on whether we have a session */
    function reflectAuth() { authSession ? showApp() : showGate(); }

    function setGateError(msg) { document.getElementById('gateError').textContent = msg || ''; }

    /* sign in with email + password */
    document.getElementById('gateForm').addEventListener('submit', async e => {
      e.preventDefault();
      if (!SB) { setGateError('Can’t reach Supabase right now — check your connection.'); return; }
      const email = document.getElementById('gateEmail').value.trim();
      const password = document.getElementById('gatePassword').value;
      const btn = document.getElementById('gateSubmit');
      setGateError(''); btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const { data, error } = await SB.auth.signInWithPassword({ email, password });
        if (error) { setGateError(error.message || 'Sign-in failed.'); }
        else {
          authSession = data.session;
          document.getElementById('gatePassword').value = '';
          showAuthMsg(false);
          showApp();
          if (pendingSync) pushToSupabase();   // flush anything queued while signed out
        }
      } catch (err) {
        setGateError('Sign-in failed. Please try again.');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });

    /* sign out */
    document.getElementById('btnSignOut').addEventListener('click', async () => {
      if (SB) { try { await SB.auth.signOut(); } catch (e) {} }
      authSession = null;
      const u = document.getElementById('adminUser'); if (u) { u.hidden = true; u.textContent = ''; }
      showGate();
    });

    /* re-show the gate from the "please sign in again" banner */
    document.getElementById('authMsgSignIn').addEventListener('click', () => { showAuthMsg(false); showGate(); });

    /* warn before leaving with unsynced changes */
    window.addEventListener('beforeunload', e => { if (pendingSync) { e.preventDefault(); e.returnValue = ''; return ''; } });

    /* ── boot ─────────────────────────────────────────────────────────
       Lesson DATA loads from Supabase as soon as the client (created in
       the module script below) is ready. If Supabase / the CDN can't be
       reached, we boot offline from localStorage after a short fallback
       and sync up later. */
    let booted = false;
    function boot() { if (booted) return; booted = true; loadData().then(reflectAuth); }

    /* pull the authoritative tree from Supabase and re-render the editor */
    async function refreshFromSupabase() {
      if (!SB) return;
      try {
        const { data, error } = await SB.from('site_data').select('content').eq('id', SB_ROW_ID).single();
        if (!error && data && data.content) {
          DATA = data.content; saveData(); pendingSync = false; setSync('saved');
          if (document.getElementById('adminApp').classList.contains('show')) renderAdmin();
        }
      } catch (e) { setSync('offline'); }
    }

    /* load the current auth session and keep it in sync across refreshes,
       token refreshes, and other tabs */
    async function initAuth() {
      try { const { data } = await SB.auth.getSession(); authSession = data.session || null; }
      catch (e) { authSession = null; }
      SB.auth.onAuthStateChange((_event, session) => {
        authSession = session || null;
        const u = document.getElementById('adminUser');
        if (authSession && authSession.user) { if (u) { u.hidden = false; u.textContent = '✓ ' + authSession.user.email; } }
        else if (u) { u.hidden = true; u.textContent = ''; }
        reflectAuth();
      });
      reflectAuth();   // in case the session resolved after first paint
    }

    /* Called by the Supabase module script with the client (or null). */
    window.__startApp = function (client) {
      SB = client || null;
      if (SB) initAuth();                    // resolve session + subscribe (non-blocking)
      if (!booted) { boot(); return; }       // first boot reads from Supabase via loadData()
      if (!SB) return;                       // booted offline, still no client
      if (pendingSync) pushToSupabase();     // we made edits offline → push them up
      else refreshFromSupabase();            // no local edits → load authoritative remote
    };

    /* Safety net: if the module never reports in (CDN blocked / slow / import
       hangs), start offline so the admin still works. */
    setTimeout(() => { if (!booted) boot(); }, 2500);
  </script>
