<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Lesson Admin — Bayt Al-Rihla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens (same pastel theme as the public site) ──────────────── */
    :root {
      --cream:       #faf8f5;
      --cream-alt:   #f2efe8;
      --white:       #ffffff;

      --g900: #14532d;
      --g700: #166534;
      --g600: #16a34a;
      --g200: #bbf7d0;
      --g100: #dcfce7;
      --g50:  #f0fdf4;

      --t900: #111827;
      --t700: #374151;
      --t500: #6b7280;
      --t400: #9ca3af;
      --t200: #e5e7eb;
      --t100: #f3f4f6;

      /* Pastel palette */
      --mint:    #d1fae5;  --mint-dk:  #6ee7b7;  --mint-tx:  #065f46;
      --lav:     #e0e7ff;  --lav-dk:   #a5b4fc;  --lav-tx:   #3730a3;
      --yell:    #fef9c3;  --yell-dk:  #fde68a;  --yell-tx:  #78350f;
      --pink:    #fce7f3;  --pink-dk:  #f9a8d4;  --pink-tx:  #831843;
      --sky:     #e0f2fe;  --sky-dk:   #7dd3fc;  --sky-tx:   #0c4a6e;
      --amber:   #fef3c7;  --amber-dk: #fcd34d;  --amber-tx: #78350f;
      --violet:  #ede9fe;  --violet-dk:#c4b5fd;  --violet-tx:#4c1d95;
      --orange:  #ffedd5;  --orange-dk:#fdba74;  --orange-tx:#7c2d12;

      --radius:    20px;
      --radius-sm: 12px;
      --pill:      999px;

      --sh0: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --sh1: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --sh2: 0 12px 40px rgba(0,0,0,0.12), 0 4px 14px rgba(0,0,0,0.06);
      --ease: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cream);
      background-image: radial-gradient(circle, rgba(0,0,0,0.038) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--t900);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: var(--g700);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Lesson reading view (used by the editor preview) ────────────── */
    .reading-content { font-size: 1rem; color: var(--t700); line-height: 1.85; }
    .reading-content h2 { font-family: 'Cinzel', serif; font-size: 1.45rem; color: var(--g900); margin: 26px 0 10px; font-weight: 700; }
    .reading-content h3 { font-size: 1.2rem; color: var(--t900); margin: 22px 0 8px; font-weight: 800; }
    .reading-content h4 { font-size: 1.02rem; color: var(--t900); margin: 18px 0 6px; font-weight: 700; }
    .reading-content p  { margin-bottom: 16px; }
    .reading-content ul { margin: 0 0 16px 22px; }
    .reading-content li { margin-bottom: 6px; }
    .reading-content strong { color: var(--t900); font-weight: 700; }
    .reading-content em { font-style: italic; }

    /* ══ ADMIN PANEL ═════════════════════════════════════════════════════ */
    #admin-page {
      position: fixed; inset: 0; z-index: 300;
      display: none;
      flex-direction: column;
      background-color: var(--cream);
      background-image: radial-gradient(circle, rgba(0,0,0,0.038) 1px, transparent 1px);
      background-size: 22px 22px;
      overflow: hidden;
    }
    #admin-page.visible { display: flex; }

    /* ── Sign-in gate ── */
    .admin-gate {
      position: absolute; inset: 0; z-index: 10;
      display: none;
      align-items: center; justify-content: center;
      padding: 24px;
      background-color: var(--cream);
      background-image: radial-gradient(circle, rgba(0,0,0,0.038) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .admin-gate.show { display: flex; }
    .gate-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--sh1);
      padding: 40px 36px;
      width: min(390px, 100%);
      text-align: center;
    }
    .gate-logo {
      width: 54px; height: 54px; margin: 0 auto 18px;
      background: var(--g700); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .gate-logo svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2; }
    .gate-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--g900); margin-bottom: 6px; }
    .gate-sub { font-size: 0.85rem; color: var(--t500); margin-bottom: 22px; line-height: 1.6; }
    .gate-input {
      width: 100%; padding: 12px 16px; margin-bottom: 10px;
      border: 1.5px solid var(--t200); border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--t900);
      outline: none; transition: border-color var(--ease), box-shadow var(--ease);
    }
    .gate-input:focus { border-color: var(--g600); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
    .gate-error { color: #b91c1c; font-size: 0.8rem; min-height: 18px; margin: 2px 0 8px; }
    .gate-back { display: inline-block; margin-top: 16px; font-size: 0.82rem; color: var(--t500); text-decoration: none; }
    .gate-back:hover { color: var(--t900); }

    /* signed-in user chip */
    .admin-user {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.74rem; font-weight: 600; color: var(--g700);
      background: var(--g50); border: 1px solid var(--g100);
      padding: 6px 11px; border-radius: var(--pill); max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .admin-user[hidden] { display: none; }

    /* "please sign in" banner when a write is rejected */
    .auth-msg {
      font-size: 0.82rem; color: #b91c1c; font-weight: 600;
      padding: 10px 20px; background: #fef2f2;
      border-bottom: 1px solid #fecaca; flex-shrink: 0;
    }
    .auth-msg[hidden] { display: none; }
    .linklike {
      border: none; background: none; padding: 0; cursor: pointer;
      color: #b91c1c; font: inherit; font-weight: 700; text-decoration: underline;
    }

    /* ── App shell ── */
    .admin-app { display: none; flex-direction: column; height: 100%; }
    .admin-app.show { display: flex; }

    .admin-topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .admin-brand { display: flex; align-items: center; gap: 10px; }
    .admin-brand .logo-icon { width: 36px; height: 36px; }
    .admin-title { font-family: 'Cinzel', serif; font-size: 0.92rem; font-weight: 700; color: var(--g900); line-height: 1.15; }
    .admin-sub { font-size: 0.66rem; color: var(--t500); }

    .admin-search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 360px; }
    .admin-search {
      width: 100%; padding: 9px 16px;
      background: var(--cream); border: 1.5px solid var(--t200);
      border-radius: var(--pill); font-family: 'Inter', sans-serif;
      font-size: 0.82rem; color: var(--t700); outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
    }
    .admin-search:focus { border-color: var(--g600); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }

    .admin-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }

    .admin-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: var(--white); color: var(--t700);
      border: 1.5px solid var(--t200); border-radius: var(--pill);
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease);
    }
    .admin-btn:hover { background: var(--t100); color: var(--t900); transform: translateY(-1px); }
    .admin-btn.primary { background: var(--g700); color: #fff; border-color: var(--g700); }
    .admin-btn.primary:hover { background: var(--g900); border-color: var(--g900); color: #fff; }
    .admin-btn.danger { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
    .admin-btn.danger:hover { background: #b91c1c; color: #fff; border-color: #b91c1c; }
    .admin-btn.block { width: 100%; justify-content: center; margin-bottom: 14px; }

    .sync-indicator {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.74rem; font-weight: 600;
      padding: 6px 12px; border-radius: var(--pill);
      transition: background var(--ease), color var(--ease);
    }
    .sync-indicator::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .sync-saved   { background: var(--g100); color: var(--g700); }
    .sync-saving  { background: var(--amber); color: var(--amber-tx); }
    .sync-offline { background: #fef2f2; color: #b91c1c; }

    .admin-note {
      font-size: 0.76rem; color: var(--t500); line-height: 1.6;
      padding: 10px 20px; background: var(--g50);
      border-bottom: 1px solid var(--t200); flex-shrink: 0;
    }
    .admin-note strong { color: var(--g700); }

    .admin-body { flex: 1; display: flex; min-height: 0; }

    /* ── Sidebar ── */
    .admin-sidebar {
      width: 330px; flex-shrink: 0;
      border-right: 1px solid var(--t200);
      background: var(--white);
      overflow-y: auto;
      padding: 16px;
    }
    .sidebar-empty, .folder-empty {
      font-size: 0.8rem; color: var(--t400); text-align: center; padding: 14px 0;
    }
    .folder-empty { padding: 8px 0; }

    .folder {
      background: var(--cream);
      border: 1px solid var(--t200);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      transition: box-shadow var(--ease);
    }
    .folder.drag-over { box-shadow: 0 0 0 2px var(--g600); }
    .folder-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px 6px; }
    .drag-dots { cursor: grab; color: var(--t400); font-size: 0.85rem; letter-spacing: -2px; user-select: none; }
    .folder-name-input {
      flex: 1; min-width: 0; border: none; background: transparent;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--t900);
      outline: none; padding: 2px 4px; border-radius: 6px;
    }
    .folder-name-input:focus { background: var(--white); box-shadow: 0 0 0 1.5px var(--g200); }
    .folder-count {
      background: var(--g100); color: var(--g700);
      border-radius: var(--pill); font-size: 0.66rem; font-weight: 700;
      padding: 2px 9px; flex-shrink: 0;
    }
    .icon-btn {
      border: none; background: none; cursor: pointer;
      color: var(--t400); font-size: 0.85rem; padding: 2px 5px; border-radius: 6px;
      transition: background var(--ease), color var(--ease);
    }
    .icon-btn:hover { background: #fef2f2; color: #b91c1c; }

    .folder-meta { display: flex; align-items: center; gap: 8px; padding: 0 12px 8px; flex-wrap: wrap; }
    .folder-subject, .folder-book {
      flex: 1 1 130px; min-width: 0;
      font-family: 'Inter', sans-serif; font-size: 0.72rem; color: var(--t600, var(--t700));
      padding: 4px 8px; border: 1px solid var(--t200); border-radius: 8px;
      background: var(--white); cursor: pointer; outline: none;
    }
    .folder-subject:disabled { opacity: 0.45; cursor: not-allowed; }
    .folder-book { border-color: var(--g200); }
    .mini-btn {
      border: 1px dashed var(--g600); background: var(--g50); color: var(--g700);
      font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600;
      padding: 4px 10px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
      transition: background var(--ease);
    }
    .mini-btn:hover { background: var(--g100); }

    .folder-lessons { padding: 0 8px 8px; display: flex; flex-direction: column; gap: 6px; min-height: 8px; }

    .admin-lesson {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--white);
      border: 1px solid var(--t200);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
    }
    .admin-lesson:hover { border-color: var(--g200); }
    .admin-lesson.selected { border-color: var(--g600); box-shadow: 0 0 0 2px rgba(22,163,74,0.14); }
    .admin-lesson.drag-over { border-top: 2px solid var(--g600); }
    .admin-lesson-title { flex: 1; min-width: 0; font-size: 0.83rem; font-weight: 600; color: var(--t900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-lesson .tag {
      font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: var(--pill);
      text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0;
    }
    .tag-draft  { background: var(--amber); color: var(--amber-tx); }
    .tag-locked { background: var(--t100); color: var(--t500); }

    /* ── Editor ── */
    .admin-main { flex: 1; overflow-y: auto; padding: 28px; min-width: 0; }
    .editor-empty { color: var(--t400); text-align: center; padding-top: 90px; font-size: 0.92rem; }

    .editor-head { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
    .editor-title-input {
      flex: 1; padding: 12px 16px;
      border: 1.5px solid var(--t200); border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--t900);
      outline: none; transition: border-color var(--ease), box-shadow var(--ease);
    }
    .editor-title-input:focus { border-color: var(--g600); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }

    .editor-toggles { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; margin-bottom: 20px; }
    .switch { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-size: 0.84rem; font-weight: 600; color: var(--t700); user-select: none; }
    .switch input { display: none; }
    .switch .track { width: 40px; height: 22px; background: var(--t200); border-radius: var(--pill); position: relative; transition: background var(--ease); flex-shrink: 0; }
    .switch .track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; box-shadow: var(--sh0); transition: transform var(--ease); }
    .switch input:checked + .track { background: var(--g600); }
    .switch input:checked + .track::after { transform: translateX(18px); }
    .editor-hint { font-size: 0.74rem; color: var(--t400); margin-left: auto; }

    .editor-label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t500); margin-bottom: 8px; }
    .preview-title { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--g900); margin-bottom: 14px; }

    /* ── Editable surface (edit inside the real reading layout) ──────── */
    .editor-surface {
      border: 1px solid var(--t200);
      border-radius: var(--radius-sm);
      min-height: 440px;
      overflow: auto;
    }
    .surface-classic {
      background: var(--cream);
      background-image: radial-gradient(circle, rgba(0,0,0,0.035) 1px, transparent 1px);
      background-size: 22px 22px;
      padding: 30px 34px;
    }
    .surface-focus { background: #fbf8f1; padding: 38px 28px; }

    /* the contenteditable body itself — design styles come from
       .reading-content / .focus-body, so this stays visually clean */
    .editor-rich { outline: none; min-height: 240px; cursor: text; border-radius: 8px; }
    .editor-rich:focus { box-shadow: 0 0 0 2px rgba(22,163,74,0.14); }
    .editor-rich:empty::before { content: attr(data-placeholder); color: var(--t400); }
    .editor-rich > :last-child { margin-bottom: 0; }

    /* ── per-lesson design picker + preview tabs (segmented control) ──── */
    .design-pick { display: inline-flex; align-items: center; gap: 10px; margin-left: auto; }
    .design-pick-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t500); }
    .layout-pick {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      margin-bottom: 12px; padding: 10px 12px; background: var(--cream);
      border: 1px solid var(--t200); border-radius: var(--radius-sm);
    }
    .layout-pick-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t500); }
    .seg { display: inline-flex; background: var(--cream); border: 1px solid var(--t200); border-radius: var(--pill); padding: 3px; gap: 2px; }
    .seg button {
      border: none; background: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.76rem; font-weight: 600;
      color: var(--t500); padding: 6px 14px; border-radius: var(--pill);
      transition: background var(--ease), color var(--ease);
    }
    .seg button:hover { color: var(--t900); }
    .seg button.active { background: var(--g700); color: #fff; }

    .preview-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .preview-seg button { padding: 5px 12px; font-size: 0.74rem; }

    /* ── block-format toolbar (above the editor) ─────────────────────── */
    .rich-toolbar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 5;
      background: var(--white);
      border-bottom: 1px solid var(--t200);
      padding: 10px 0; margin-bottom: 12px;
    }
    .rt-btn {
      min-width: 34px; height: 32px; padding: 0 10px;
      border: 1.5px solid var(--t200); background: var(--white); color: var(--t700);
      border-radius: 9px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 700;
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    .rt-btn:hover { background: var(--g50); border-color: var(--g200); color: var(--g700); }
    .rt-hint { font-size: 0.72rem; color: var(--t400); margin-left: 4px; }
    .rt-hint b, .rt-hint i { color: var(--t500); }

    /* ── global default design control (topbar) ──────────────────────── */
    .global-design {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--t500);
    }
    .global-design select {
      font-family: 'Inter', sans-serif; font-size: 0.76rem; font-weight: 600; color: var(--t700);
      padding: 6px 8px; border: 1.5px solid var(--t200); border-radius: var(--pill);
      background: var(--white); cursor: pointer; outline: none; text-transform: none; letter-spacing: 0;
    }

    /* ── floating format toolbar (Bold / Italic / Highlight) ─────────── */
    .fmt-toolbar {
      position: absolute; z-index: 500;
      display: flex; align-items: center; gap: 2px;
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--pill);
      box-shadow: 0 8px 28px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.08);
      padding: 4px;
    }
    .fmt-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 30px; padding: 0 10px;
      border: none; background: none; cursor: pointer;
      border-radius: var(--pill);
      font-family: 'Inter', sans-serif; font-size: 0.84rem; color: var(--t700);
      transition: background var(--ease), color var(--ease);
    }
    .fmt-btn:hover { background: var(--t100); color: var(--t900); }
    .fmt-btn.active { background: var(--g100); color: var(--g700); }
    .fmt-btn b { font-weight: 800; }
    .fmt-btn i { font-style: italic; font-family: Georgia, serif; }
    .fmt-sep { width: 1px; height: 20px; background: var(--t200); margin: 0 4px; flex-shrink: 0; }

    /* ── Highlight colour swatches (both toolbars) ───────────────────── */
    .rt-sep { width: 1px; height: 22px; background: var(--t200); margin: 0 4px; }
    .rt-hl-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--t500); }
    .hl-swatches { display: inline-flex; align-items: center; gap: 5px; }
    .hl-swatch {
      width: 19px; height: 19px; padding: 0;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 50%; cursor: pointer;
      transition: transform var(--ease), box-shadow var(--ease);
    }
    .hl-swatch:hover { transform: scale(1.15); }
    .hl-swatch.active { box-shadow: 0 0 0 2px var(--white), 0 0 0 4px var(--g600); }
    .hl-swatch.hl-none {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--white); color: var(--t400); font-size: 0.7rem; line-height: 1;
    }
    .hl-swatch.hl-none:hover { color: var(--t700); }

    /* ── Highlight pills (shared with public site) ───────────────────── */
    .hl, mark.hl {
      background: #dbeafe; color: inherit;
      border-radius: 6px; padding: 0.05em 0.32em;
      box-decoration-break: clone; -webkit-box-decoration-break: clone;
    }
    .hl-yellow { background: #fef08a; }
    .hl-green  { background: #bbf7d0; }
    .hl-blue   { background: #dbeafe; }
    .hl-pink   { background: #fbcfe8; }
    .hl-orange { background: #fed7aa; }

    /* ── Section colour swatches (toolbar) ───────────────────────────── */
    .rt-sec-swatches { display: inline-flex; align-items: center; gap: 5px; }
    .sec-swatch {
      width: 18px; height: 18px; padding: 0;
      border: 1.5px solid rgba(0,0,0,0.12); border-radius: 5px; cursor: pointer;
      transition: transform var(--ease);
    }
    .sec-swatch:hover { transform: scale(1.15); }

    /* ── Quranic ayah box (compact) ──────────────────────────────────── */
    .ayah-box {
      position: relative; background: #ffffff;
      border: 1px solid var(--t200); border-left: 4px solid #0d9488;
      border-radius: var(--radius-sm); padding: 12px 26px 12px 60px; margin: 20px 0;
      box-shadow: var(--sh0);
    }
    .ayah-box::before {
      content: '۞'; position: absolute; left: 16px; top: 12px;
      width: 30px; height: 30px; border-radius: 9px;
      background: #ccfbf1; color: #0d9488;
      display: flex; align-items: center; justify-content: center; font-size: 1rem; line-height: 1;
    }
    .ayah-arabic {
      direction: rtl; text-align: right;
      font-family: 'Amiri', 'Scheherazade New', 'Noto Naskh Arabic', serif;
      font-size: 1.85rem; line-height: 1.5; color: var(--t900); margin-bottom: 4px; outline: none;
    }
    .ayah-trans { font-size: 0.94rem; font-style: italic; color: var(--t500); line-height: 1.5; outline: none; }
    .ayah-arabic:empty::before { content: 'اكتب الآية هنا'; color: var(--t400); }
    .ayah-trans:empty::before  { content: 'Translation…';  color: var(--t400); font-style: italic; }

    /* ── Section box (titled, tinted) ────────────────────────────────── */
    .section-box {
      position: relative;
      border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-sm);
      background: #ffffff; padding: 18px 22px 4px; margin: 24px 0;
    }

    /* ── In-editor delete button on components ───────────────────────── */
    .comp-del {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      border: 1px solid var(--t200); background: var(--white); color: var(--t500);
      font-size: 0.74rem; line-height: 1; cursor: pointer; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity var(--ease), background var(--ease), color var(--ease), border-color var(--ease);
    }
    .ayah-box:hover .comp-del, .section-box:hover .comp-del,
    .ayah-box:focus-within .comp-del, .section-box:focus-within .comp-del { opacity: 1; }
    .comp-del:hover { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .section-bg-yellow { background: #fef9c3; }
    .section-bg-mint   { background: #d1fae5; }
    .section-bg-blue   { background: #e0f2fe; }
    .section-bg-pink   { background: #fce7f3; }
    .section-bg-peach  { background: #ffedd5; }
    .section-pill {
      display: inline-block; background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.07); color: var(--t900); font-weight: 700; font-size: 0.82rem;
      padding: 5px 14px; border-radius: var(--pill); margin-bottom: 12px; outline: none;
    }
    .section-body { outline: none; }
    .section-body > :last-child { margin-bottom: 0; }
    .section-body:empty::before { content: 'Section content…'; color: var(--t400); }

    /* ── 3-step navigation (left sidebar) ────────────────────────────── */
    .nav-crumbs { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .crumb-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; min-width: 0; }
    .crumb {
      border: none; background: none; cursor: pointer; padding: 2px 4px; border-radius: 6px;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--t500);
    }
    .crumb:hover { color: var(--g700); background: var(--g50); }
    .crumb.current { color: var(--g900); font-weight: 800; }
    .crumb-sep { color: var(--t400); font-size: 0.8rem; }
    .nav-back-btn {
      border: 1px solid var(--t200); background: var(--white); cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.74rem; font-weight: 600; color: var(--t700);
      padding: 5px 10px; border-radius: var(--pill); flex-shrink: 0;
    }
    .nav-back-btn:hover { background: var(--t100); color: var(--t900); }
    .nav-heading { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t500); margin: 4px 4px 12px; }
    .nav-list { display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; text-align: left;
      background: var(--white); border: 1px solid var(--t200); border-radius: var(--radius-sm);
      padding: 13px 16px; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: border-color var(--ease), box-shadow var(--ease), transform var(--ease);
    }
    .nav-item:hover { border-color: var(--g200); box-shadow: var(--sh0); transform: translateX(2px); }
    .nav-item > span:first-child { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .nav-item-title { font-size: 0.9rem; font-weight: 700; color: var(--t900); }
    .nav-item-desc  { font-size: 0.74rem; color: var(--t500); }
    .nav-arrow { color: var(--t400); flex-shrink: 0; transition: transform var(--ease), color var(--ease); }
    .nav-item:hover .nav-arrow { transform: translateX(3px); color: var(--g700); }

    /* ── Scholars manager (main pane) ────────────────────────────────── */
    .sc-mgr-title { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--g900); }
    .sc-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .sc-card { display: flex; gap: 14px; align-items: flex-start; background: var(--white); border: 1px solid var(--t200); border-radius: var(--radius-sm); padding: 14px 16px; }
    .sc-avatar {
      width: 46px; height: 46px; flex-shrink: 0; border-radius: 50%;
      background: var(--mint); color: var(--mint-tx);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.95rem;
    }
    .sc-fields { flex: 1; min-width: 0; }
    .sc-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .sc-name { flex: 1; min-width: 0; padding: 8px 10px; border: 1.5px solid var(--t200); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.86rem; font-weight: 600; color: var(--t900); outline: none; }
    .sc-init { width: 56px; text-align: center; padding: 8px 6px; border: 1.5px solid var(--t200); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.82rem; outline: none; }
    .sc-name:focus, .sc-init:focus, .sc-desc:focus { border-color: var(--g600); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
    .sc-desc { width: 100%; padding: 8px 10px; border: 1.5px solid var(--t200); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--t700); outline: none; resize: vertical; }

    /* ── Focus design — preview pane only ────────────────────────────── */
    .preview-focus { background: #fbf8f1; }
    .focus-article-mini { max-width: 600px; margin: 0 auto; }
    .focus-kicker {
      font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase; color: var(--g700); margin-bottom: 12px;
    }
    .focus-title {
      font-family: 'Cinzel', serif; font-size: 1.7rem; font-weight: 700;
      line-height: 1.2; letter-spacing: -0.5px; color: #1f2430; margin-bottom: 16px;
    }
    .focus-rule { width: 48px; height: 3px; border-radius: 2px; background: var(--g600); opacity: 0.85; margin-bottom: 26px; }
    .focus-body {
      font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
      font-size: 1.08rem; line-height: 1.9; color: #2c2a26;
    }
    .focus-body p  { margin-bottom: 18px; }
    .focus-body ul { margin: 0 0 18px 22px; }
    .focus-body li { margin-bottom: 8px; }
    .focus-body strong { color: #1f2430; font-weight: 700; }
    .focus-body em { font-style: italic; }
    .focus-body h2, .focus-body h3, .focus-body h4 { font-family: 'Inter', sans-serif; color: #1f2430; line-height: 1.3; }
    .focus-body h2 { font-size: 1.35rem; font-weight: 800; margin: 30px 0 12px; }
    .focus-body h3 { font-size: 1.12rem; font-weight: 800; margin: 24px 0 8px; }
    .focus-body h4 { font-size: 1rem;    font-weight: 700; margin: 20px 0 6px; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .admin-body { flex-direction: column; }
      .admin-sidebar { width: 100%; max-height: 42vh; border-right: none; border-bottom: 1px solid var(--t200); }
      .editor-surface { min-height: 320px; }
      .surface-classic, .surface-focus { padding: 22px 18px; }
      .admin-topbar { padding: 10px 14px; }
      .admin-search-wrap { order: 3; flex-basis: 100%; max-width: none; }
      .design-pick { margin-left: 0; }
      .global-design { display: none; }
      .rt-hint { display: none; }
    }
  </style>
</head>

<body>

  <!-- ── ADMIN PANEL (private editing page) ────────────────────────────── -->

  <!-- ── JS ────────────────────────────────────────────────────────────── -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       SUBJECTS — keys/names must match index.html so folders map to the
       right subject's Learn page on the public site.
    ══════════════════════════════════════════════════════════════════ */
    const SUBJECTS = {
      aqeedah: { name: 'Aqeedah' },
      hadith:  { name: 'Hadith' },
      fiqh:    { name: 'Fiqh' },
      tafseer: { name: 'Tafseer' },
      seerah:  { name: 'Seerah' },
      ethics:  { name: 'Questions' },
      history: { name: 'Islamic History' },
      arabic:  { name: 'Arabic' }
    };

    /* ══════════════════════════════════════════════════════════════════
       BOOKS — registry of the books shown on the public site. ids MUST
       match the `id:` fields in index.html's SUBJECTS books. Assign a
       folder to one of these to turn it into a VOLUME of that book; the
       folder name is the volume name (e.g. "Volume One") and its lessons
       become the book's topics. Leave a folder's book empty for a normal
       Learn module.
    ══════════════════════════════════════════════════════════════════ */
    const BOOKS = [
      { id: 'thalathat-al-usool',       subject: 'aqeedah', title: 'Thalathat al-Usool' },
      { id: 'kitab-at-tawhid',          subject: 'aqeedah', title: 'Kitaab al-Tawheed' },
      { id: 'al-aqeedah-al-wasitiyyah', subject: 'aqeedah', title: 'Al-Aqeedah al-Wasitiyyah' },
      { id: 'arbaeen-nawawiyyah',       subject: 'hadith',  title: "Al-Arba'een al-Nawawiyyah" },
      { id: 'riyadh-as-saliheen',       subject: 'hadith',  title: 'Riyaadh al-Saaliheen' },
      { id: 'umdah-al-ahkaam',          subject: 'hadith',  title: 'Umdah al-Ahkaam' }
    ];

    /* ── shared helpers (same as the public site) ───────────────────── */
    function escHTML(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttrQ(s) { return escHTML(s).replace(/"/g, '&quot;'); }

    function findLessonById(id) {
      for (const f of (DATA.folders || [])) {
        const i = (f.lessons || []).findIndex(l => l.id === id);
        if (i >= 0) return { folder: f, lesson: f.lessons[i], index: i };
      }
      const cats = (DATA.questions && DATA.questions.categories) || [];
      for (const cat of cats) for (const f of (cat.folders || [])) {
        const i = (f.lessons || []).findIndex(l => l.id === id);
        if (i >= 0) return { folder: f, lesson: f.lessons[i], index: i, category: cat };
      }
      return null;
    }

    /* tiny markdown: # headings, **bold**, *italic*, - lists, line breaks */
    function mdInline(t) {
      return t
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }
    function renderMarkdown(src) {
      const lines = escHTML(src || '').split('\n');
      let out = '', para = [], list = [];
      const flushP = () => { if (para.length) { out += `<p>${para.map(mdInline).join('<br>')}</p>`; para = []; } };
      const flushL = () => { if (list.length) { out += `<ul>${list.map(li => `<li>${mdInline(li)}</li>`).join('')}</ul>`; list = []; } };
      for (const raw of lines) {
        const line = raw.replace(/\s+$/, '');
        const h  = line.match(/^(#{1,3})\s+(.*)$/);
        const li = line.match(/^\s*[-*]\s+(.*)$/);
        if (h)               { flushP(); flushL(); out += `<h${h[1].length + 1}>${mdInline(h[2])}</h${h[1].length + 1}>`; }
        else if (li)         { flushP(); list.push(li[1]); }
        else if (!line.trim()){ flushP(); flushL(); }
        else                 { flushL(); para.push(line); }
      }
      flushP(); flushL();
      return out || '<p style="color:var(--t400)">Nothing to preview yet.</p>';
    }

    /* ── rich-text lesson content (HTML) — mirrors the public site ─────── */
    function looksLikeHTML(s) {
      return /<(\/?)(p|br|strong|em|mark|h[1-6]|ul|ol|li|b|i|div|span|a|blockquote)\b/i.test(s || '');
    }

    const HTML_ALLOWED = { P:1, BR:1, STRONG:1, EM:1, MARK:1, H2:1, H3:1, H4:1, UL:1, OL:1, LI:1, BLOCKQUOTE:1 };
    const HTML_RENAME  = { B:'STRONG', I:'EM', H1:'H2', H5:'H4', H6:'H4' };
    const HL_CLASSES   = { 'hl':1, 'hl-yellow':1, 'hl-green':1, 'hl-blue':1, 'hl-pink':1, 'hl-orange':1 };
    const DIV_CLASSES  = {
      'ayah-box':1, 'ayah-content':1, 'ayah-arabic':1, 'ayah-trans':1,
      'section-box':1, 'section-pill':1, 'section-body':1,
      'section-bg-yellow':1, 'section-bg-mint':1, 'section-bg-blue':1, 'section-bg-pink':1, 'section-bg-peach':1
    };

    function filterClasses(el, allow) {
      return (el.className || '').split(/\s+/).filter(c => allow[c]);
    }
    /* keep only whitelisted highlight classes on a <mark>; always include base 'hl' */
    function markClass(el) {
      const classes = filterClasses(el, HL_CLASSES);
      if (classes.indexOf('hl') === -1) classes.unshift('hl');
      return classes.join(' ');
    }

    /* highlight palette — soft pastels matching the site */
    const HL_COLORS = [
      { key: 'yellow', css: '#fef08a' },
      { key: 'green',  css: '#bbf7d0' },
      { key: 'blue',   css: '#dbeafe' },
      { key: 'pink',   css: '#fbcfe8' },
      { key: 'orange', css: '#fed7aa' }
    ];
    function hlSwatchHTML() {
      return HL_COLORS.map(c =>
        `<button type="button" class="hl-swatch" data-hl="${c.key}" title="${c.key[0].toUpperCase() + c.key.slice(1)} highlight" style="background:${c.css}"></button>`
      ).join('') +
      '<button type="button" class="hl-swatch hl-none" data-hl="none" title="Remove highlight">⌀</button>';
    }

    function cleanNodes(node) {
      const frag = document.createDocumentFragment();
      node.childNodes.forEach(child => {
        if (child.nodeType === 3) { frag.appendChild(document.createTextNode(child.nodeValue)); return; }
        if (child.nodeType !== 1) return;
        if (child.tagName === 'BUTTON') return;      // drop editor-only controls (e.g. delete buttons)

        if (child.tagName === 'DIV') {
          const classes = filterClasses(child, DIV_CLASSES);
          if (classes.length) {
            const el = document.createElement('div');
            el.className = classes.join(' ');
            const dir = child.getAttribute && child.getAttribute('dir');
            if (dir) el.setAttribute('dir', dir === 'rtl' ? 'rtl' : 'ltr');
            el.appendChild(cleanNodes(child));
            frag.appendChild(el);
          } else {
            const p = document.createElement('p');
            p.appendChild(cleanNodes(child));
            frag.appendChild(p);
          }
          return;
        }

        const tag = HTML_RENAME[child.tagName] || child.tagName;
        const inner = cleanNodes(child);
        if (HTML_ALLOWED[tag]) {
          const el = document.createElement(tag);
          if (tag === 'MARK') el.className = markClass(child);
          el.appendChild(inner);
          frag.appendChild(el);
        } else {
          frag.appendChild(inner);
        }
      });
      return frag;
    }

    function sanitizeHTML(html) {
      const holder = document.createElement('div');
      holder.innerHTML = html || '';
      const out = document.createElement('div');
      out.appendChild(cleanNodes(holder));
      return out.innerHTML;
    }

    /* stored content → safe HTML for the editor / preview */
    function renderLessonHTML(content) {
      if (looksLikeHTML(content)) return sanitizeHTML(content);
      return renderMarkdown(content);                     // legacy Markdown
    }

    function effectiveDesign(lesson) {
      const d = (lesson && lesson.design) ||
                (DATA.settings && DATA.settings.defaultDesign) || 'classic';
      return d === 'focus' ? 'focus' : 'classic';
    }

    /* ══════════════════════════════════════════════════════════════════
       LESSON DATA + SYNC
       ------------------------------------------------------------------
       Writes to the SAME Supabase project + table (site_data, row id=1)
       that index.html reads from, so every edit here shows on the public
       site instantly. Access is gated by REAL Supabase Auth (email +
       password); only a signed-in session can write (enforced by RLS).
    ══════════════════════════════════════════════════════════════════ */
    const LS_DATA = 'bar_lessons_v1';   // local cache (shared key with index.html)

    let DATA = { folders: [] };
    let selectedLessonId = null;
    let dragData = null;
    let authSession = null;      // current Supabase Auth session (or null)
    let activeRich = null;       // the contenteditable element being edited
    let activeRichSync = null;   // () => persist editor HTML + refresh preview

    let SB = null;               // Supabase client (or null when offline)
    const SB_ROW_ID = 1;         // row in site_data that holds the whole tree
    let saveTimer = null;        // debounce timer for pushes
    let pendingSync = false;     // local changes not yet confirmed in Supabase
    let isSaving = false;

    const SUBJECT_OPTIONS = Object.entries(SUBJECTS).map(([k, v]) => [k, v.name]);
    const uid = () => 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);

    function defaultData() {
      return {
        folders: [
          {

              { id: uid(), title: 'The Categories of Tawheed', published: true, locked: true,
                content: '# The Categories of Tawheed\n\nThis lesson is currently *locked*.' }
            ]
          },

                content: '# Actions are by Intentions\n\nThe Prophet ﷺ said:\n\n*"Actions are but by intentions, and every person will have only what they intended."*\n\nThis hadith is a foundation of the religion.' }

    /* local mirror (offline fallback + instant persistence) */
    function saveData() { try { localStorage.setItem(LS_DATA, JSON.stringify(DATA)); } catch (e) {} }

    /* ── sync status pill ('Saving…' / 'Saved' / 'Offline') ─────────── */
    function setSync(state) {
      const el = document.getElementById('syncIndicator');
      if (!el) return;
      el.classList.remove('sync-saved', 'sync-saving', 'sync-offline');
      if (state === 'saving')       { el.classList.add('sync-saving');  el.textContent = 'Saving…'; }
      else if (state === 'offline') { el.classList.add('sync-offline'); el.textContent = 'Offline — saved locally'; }
      else                          { el.classList.add('sync-saved');   el.textContent = 'Saved'; }
    }

    /* a valid data tree must be an object with a folders array */
    function isTree(d) { return !!(d && Array.isArray(d.folders)); }
    function safeParse(s) { try { return s ? JSON.parse(s) : null; } catch (e) { return null; } }

    /* Load priority: Supabase (row id=1) → localStorage → data.json → sample.
       An empty/blank Supabase row is treated as a fresh, empty tree (we do
       NOT overwrite it with sample data). If Supabase is unreachable but we
       have a local copy, it's marked pending so it syncs UP once back. */
    async function loadData() {
      if (SB) {
        try {
          const { data, error } = await SB.from('site_data').select('content').eq('id', SB_ROW_ID).single();
          if (!error && data) {
            DATA = isTree(data.content) ? data.content : { folders: [] };
            saveData(); pendingSync = false; setSync('saved');
            return;
          }
        } catch (e) { /* unreachable → offline fallbacks below */ }
      }
      const local = safeParse(localStorage.getItem(LS_DATA));
      if (isTree(local)) {
        DATA = local; pendingSync = !!SB; setSync(SB ? 'saving' : 'saved');
        if (SB) pushToSupabase();                 // sync local copy up to the row
        return;
      }
      try {
        const res = await fetch('data.json', { cache: 'no-store' });
        if (res.ok) {
          const j = await res.json();
          if (isTree(j)) {
            DATA = j; saveData(); pendingSync = !!SB; setSync(SB ? 'saving' : 'saved');
            if (SB) pushToSupabase();
            return;
          }
        }
      } catch (e) {}
      DATA = defaultData(); saveData(); pendingSync = !!SB; setSync(SB ? 'saving' : 'saved');
      if (SB) pushToSupabase();
    }

    /* ── live save: write localStorage now, push to Supabase (debounced) ── */
    function scheduleSave() {
      saveData();
      pendingSync = true;
      setSync('saving');
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(pushToSupabase, 800);
    }

    /* an error is "auth-related" if RLS blocked it or there's no session */
    function isAuthError(e) {
      if (!authSession) return true;
      const code = e && (e.code || e.status);
      const msg = (e && e.message || '').toLowerCase();
      return code === '42501' || code === 401 || code === 403 ||
             /row-level security|jwt|not authorized|permission|policy/.test(msg);
    }

    async function pushToSupabase() {
      if (!SB) { setSync('offline'); return; }          // stays pending; retried on reconnect
      if (!authSession) { setSync('offline'); showAuthMsg(true); return; }  // must be signed in to write
      isSaving = true; setSync('saving');
      try {
        const { error } = await SB.from('site_data').upsert({ id: SB_ROW_ID, content: DATA }, { onConflict: 'id' });
        if (error) throw error;
        pendingSync = false; isSaving = false; setSync('saved'); showAuthMsg(false);
      } catch (e) {
        isSaving = false; setSync('offline');            // keep pending; will retry
        if (isAuthError(e)) showAuthMsg(true);           // friendly "please sign in"
      }
    }

    function showAuthMsg(on) {
      const el = document.getElementById('authMsg');
      if (el) el.hidden = !on;
    }

    /* Retry the upload when the network comes back or periodically. */
    window.addEventListener('online', () => { if (pendingSync) pushToSupabase(); });
    setInterval(() => { if (pendingSync && !isSaving && SB) pushToSupabase(); }, 15000);

    function commit() { scheduleSave(); }   // persist + sync (after structural changes)

    /* ══════════════════════════════════════════════════════════════════
       3-STEP NAVIGATION  (Area → Sub-section → Management)
       ------------------------------------------------------------------
       Everything still reads/writes the same folders/lessons; the nav
       just filters them so each lesson sits under its area + sub-section.
    ══════════════════════════════════════════════════════════════════ */
    const AREAS = Object.entries(SUBJECTS).map(([k, v]) => ({ key: k, name: v.name }))
                        .concat([{ key: 'scholars', name: 'Scholars' }]);

    const DEFAULT_SCHOLARS = [
      { id: 'sch-1', name: 'Ibn Taymiyyah',              initials: 'IT', desc: 'Shaykhul Islam\n661–728 AH' },
      { id: 'sch-2', name: 'Ibn al-Qayyim',              initials: 'IQ', desc: 'Student of Ibn Taymiyyah\n691–751 AH' },
      { id: 'sch-3', name: 'Muhammad ibn Abd al-Wahhab', initials: 'MW', desc: 'Reviver of Tawheed\n1115–1206 AH' },
      { id: 'sch-4', name: 'Al-Albani',                  initials: 'AL', desc: 'Scholar of Hadith\n1914–1999 CE' },
      { id: 'sch-5', name: 'Ibn Baz',                    initials: 'IB', desc: 'Grand Mufti of Saudi Arabia\n1910–1999 CE' },
      { id: 'sch-6', name: 'Ibn Uthaymeen',              initials: 'IU', desc: 'The Beloved Scholar\n1925–2001 CE' },
      { id: 'sch-7', name: 'Salih al-Fawzan',            initials: 'SF', desc: 'Senior Scholar of our time' }
    ];

    let navArea   = null;   // subject key or 'scholars'
    let navSub    = null;   // 'learn' | 'books' | 'questions' | 'scholars' | 'qmanage'
    let navBookId = null;   // a specific book while managing its volumes
    let adminQCat = null;   // selected Questions category (3-level manager)
    let adminQFolder = null;// selected folder within that category

    /* the "Questions" subject is keyed 'ethics' but uses its own 3-level model */
    const QSUBJECT = 'ethics';

    /* ensure DATA.questions exists; migrate any legacy ethics/questions folders.
       returns true if the tree changed (so the caller can persist). */
    function ensureQuestions() {
      let changed = false;
      if (!DATA.questions || !Array.isArray(DATA.questions.categories)) { DATA.questions = { categories: [] }; }
      const legacy = (DATA.folders || []).filter(f => f.subject === 'ethics' && f.section === 'questions');
      if (legacy.length) {
        let cat = DATA.questions.categories[0];
        if (!cat) { cat = { id: uid(), name: 'General', folders: [] }; DATA.questions.categories.push(cat); }
        legacy.forEach(f => cat.folders.push({ id: f.id, name: f.name, lessons: f.lessons || [] }));
        DATA.folders = DATA.folders.filter(f => !(f.subject === 'ethics' && f.section === 'questions'));
        changed = true;
      }
      return changed;
    }

    function subLabel(s) {
      return s === 'learn' ? 'Learn' : s === 'books' ? 'Books'
           : s === 'questions' ? 'Questions' : s === 'scholars' ? 'Scholars' : s;
    }

    /* ── orchestrator ───────────────────────────────────────────────── */
    function renderAdmin() {
      if (!isTree(DATA)) DATA = { folders: [] };
      const gd = document.getElementById('globalDesign');
      if (gd) gd.value = (DATA.settings && DATA.settings.defaultDesign === 'focus') ? 'focus' : 'classic';
      const searchWrap = document.getElementById('adminSearchWrap');
      if (searchWrap) searchWrap.style.visibility = (navArea && navSub && navArea !== 'scholars' && navArea !== QSUBJECT) ? 'visible' : 'hidden';

      renderNav();

      // Scholars are edited in the main pane; everything else uses the lesson editor
      if (navArea === 'scholars' && navSub === 'scholars') {
        renderScholarsManager(document.getElementById('adminMain'));
      } else {
        renderEditor();
      }
    }

    function renderNav() {
      renderCrumbs();
      const panel = document.getElementById('navPanel');
      if (!navArea) {
        panel.innerHTML = renderAreas();
      } else if (navArea === QSUBJECT) {            // Questions: dedicated 3-level manager
        renderQuestionsManager(panel);
        return;
      } else if (!navSub) {
        panel.innerHTML = renderSubs();
      } else if (navArea === 'scholars') {
        panel.innerHTML = '<p class="sidebar-empty">Editing the scholars list →<br>use the panel on the right.</p>';
      } else {
        renderManagement(panel);
        return;
      }
      panel.querySelectorAll('[data-area]').forEach(b => b.addEventListener('click', () => {
        navArea = b.dataset.area;
        navSub = navArea === 'scholars' ? 'scholars' : navArea === QSUBJECT ? 'qmanage' : null;
        navBookId = null; adminQCat = null; adminQFolder = null; selectedLessonId = null;
        renderAdmin();
      }));
      panel.querySelectorAll('[data-sub]').forEach(b => b.addEventListener('click', () => {
        navSub = b.dataset.sub; navBookId = null; selectedLessonId = null; renderAdmin();
      }));
    }

    /* ── breadcrumbs + back ─────────────────────────────────────────── */
    function renderCrumbs() {
      const el = document.getElementById('navCrumbs');
      const parts = [`<button class="crumb ${!navArea ? 'current' : ''}" data-nav="root">Areas</button>`];
      if (navArea) {
        const a = AREAS.find(x => x.key === navArea);
        const areaCurrent = navArea === QSUBJECT ? !adminQCat : !navSub;
        parts.push('<span class="crumb-sep">›</span>',
          `<button class="crumb ${areaCurrent ? 'current' : ''}" data-nav="area">${escHTML(a ? a.name : navArea)}</button>`);
      }
      if (navArea === QSUBJECT) {
        if (adminQCat) {
          const cat = (DATA.questions.categories || []).find(c => c.id === adminQCat);
          parts.push('<span class="crumb-sep">›</span>',
            `<button class="crumb ${!adminQFolder ? 'current' : ''}" data-nav="qcat">${escHTML(cat ? cat.name : 'Category')}</button>`);
        }
        if (adminQFolder) {
          const cat = (DATA.questions.categories || []).find(c => c.id === adminQCat);
          const f = cat && (cat.folders || []).find(x => x.id === adminQFolder);
          parts.push('<span class="crumb-sep">›</span>',
            `<button class="crumb current" data-nav="qfolder">${escHTML(f ? f.name : 'Folder')}</button>`);
        }
      } else {
        if (navArea && navSub && navArea !== 'scholars') {
          parts.push('<span class="crumb-sep">›</span>',
            `<button class="crumb ${!navBookId ? 'current' : ''}" data-nav="sub">${escHTML(subLabel(navSub))}</button>`);
        }
        if (navBookId) {
          const b = BOOKS.find(x => x.id === navBookId);
          parts.push('<span class="crumb-sep">›</span>',
            `<button class="crumb current" data-nav="book">${escHTML(b ? b.title : 'Book')}</button>`);
        }
      }
      el.innerHTML = `<div class="crumb-row">${parts.join('')}</div>` +
                     (navArea ? '<button class="nav-back-btn" id="navUp">← Back</button>' : '');
      el.querySelectorAll('.crumb').forEach(c => c.addEventListener('click', () => {
        const t = c.dataset.nav;
        if (t === 'root') { navArea = null; navSub = null; navBookId = null; adminQCat = null; adminQFolder = null; }
        else if (t === 'area') { navSub = (navArea === 'scholars' ? 'scholars' : navArea === QSUBJECT ? 'qmanage' : null); navBookId = null; adminQCat = null; adminQFolder = null; }
        else if (t === 'sub') { navBookId = null; }
        else if (t === 'qcat') { adminQFolder = null; }
        selectedLessonId = null; renderAdmin();
      }));
      const up = document.getElementById('navUp');
      if (up) up.addEventListener('click', () => {
        if (navArea === QSUBJECT) {
          if (adminQFolder) adminQFolder = null;
          else if (adminQCat) adminQCat = null;
          else { navArea = null; navSub = null; }
        }
        else if (navBookId) navBookId = null;
        else if (navSub && navArea !== 'scholars') navSub = null;
        else { navArea = null; navSub = null; }
        selectedLessonId = null; renderAdmin();
      });
    }

    /* ── STEP 1: areas ──────────────────────────────────────────────── */
    function renderAreas() {
      return '<div class="nav-heading">Choose an area to edit</div><div class="nav-list">' +
        AREAS.map(a => `<button class="nav-item" data-area="${a.key}"><span class="nav-item-title">${escHTML(a.name)}</span><span class="nav-arrow">→</span></button>`).join('') +
        '</div>';
    }

    /* ── STEP 2: sub-sections ───────────────────────────────────────── */
    function renderSubs() {
      const a = AREAS.find(x => x.key === navArea);
      const subs = [
        { key: 'learn',     title: 'Learn',     desc: 'Structured curriculum lessons' },
        { key: 'books',     title: 'Books',     desc: 'Books, volumes and topics' },
        { key: 'questions', title: 'Questions', desc: 'Common questions & answers' }
      ];
      return `<div class="nav-heading">${escHTML(a ? a.name : '')} — choose a section</div><div class="nav-list">` +
        subs.map(s => `<button class="nav-item" data-sub="${s.key}"><span><span class="nav-item-title">${escHTML(s.title)}</span><span class="nav-item-desc">${escHTML(s.desc)}</span></span><span class="nav-arrow">→</span></button>`).join('') +
        '</div>';
    }

    /* ── STEP 3: management ─────────────────────────────────────────── */
    function renderManagement(panel) {
      if (navSub === 'books' && !navBookId) { renderBooksList(panel); return; }
      renderFolderManager(panel);
    }

    function renderBooksList(panel) {
      const books = BOOKS.filter(b => b.subject === navArea);
      panel.innerHTML = '<div class="nav-heading">Choose a book to manage its volumes</div>' +
        (books.length
          ? '<div class="nav-list">' + books.map(b => `<button class="nav-item" data-book="${b.id}"><span class="nav-item-title">📖 ${escHTML(b.title)}</span><span class="nav-arrow">→</span></button>`).join('') + '</div>'
          : '<p class="sidebar-empty">No books are defined for this area.</p>');
      panel.querySelectorAll('[data-book]').forEach(b => b.addEventListener('click', () => {
        navBookId = b.dataset.book; selectedLessonId = null; renderAdmin();
      }));
    }

    function folderFilter() {
      if (navBookId) return f => f.book === navBookId;
      if (navSub === 'questions') return f => f.subject === navArea && !f.book && f.section === 'questions';
      return f => f.subject === navArea && !f.book && (f.section || 'learn') === 'learn';
    }
    function newFolderTemplate() {
      if (navBookId)            return { id: uid(), name: 'Volume One', subject: navArea, book: navBookId, lessons: [] };
      if (navSub === 'questions') return { id: uid(), name: 'New group', subject: navArea, section: 'questions', lessons: [] };
      return { id: uid(), name: 'New Folder', subject: navArea, lessons: [] };
    }

    function renderFolderManager(panel) {
      const vol = !!navBookId;
      const itemWord = vol ? 'Topic' : 'Lesson';
      const newLabel = vol ? '+ New Volume' : '+ New Folder';
      const folders = DATA.folders.filter(folderFilter());
      const q = (document.getElementById('adminSearch').value || '').trim().toLowerCase();

      // public layout toggle (Learn / Questions sections only — not book volumes)
      let html = '';
      if (!vol) {
        const cur = (DATA.layouts && DATA.layouts[navArea + ':' + navSub]) === 'folders' ? 'folders' : 'flat';
        html += `<div class="layout-pick">
          <span class="layout-pick-label">Public layout</span>
          <div class="seg" id="layoutSeg">
            <button type="button" data-layout="flat" class="${cur === 'flat' ? 'active' : ''}">Flat list</button>
            <button type="button" data-layout="folders" class="${cur === 'folders' ? 'active' : ''}">Folder view</button>
          </div>
        </div>`;
      }
      html += `<button class="admin-btn primary block" id="btnNewFolder">${newLabel}</button>`;
      if (!folders.length) {
        html += `<p class="sidebar-empty">Nothing here yet.<br>Use “${newLabel}” to begin.</p>`;
      } else {
        html += folders.map(f => {
          const lessons = f.lessons || [];
          const visible = q ? lessons.filter(l => (l.title || '').toLowerCase().includes(q)) : lessons;
          const rows = visible.map(l => {
            const tags = (l.published ? '' : '<span class="tag tag-draft">Draft</span>') +
                         (l.locked ? '<span class="tag tag-locked">🔒</span>' : '');
            return `<div class="admin-lesson ${l.id === selectedLessonId ? 'selected' : ''}" draggable="true" data-lesson="${escAttrQ(l.id)}" data-folder="${escAttrQ(f.id)}">
                      <span class="drag-dots">⠿</span><span class="admin-lesson-title">${escHTML(l.title)}</span>${tags}</div>`;
          }).join('') || `<p class="folder-empty">No ${vol ? 'topics' : 'lessons'}</p>`;
          return `<div class="folder" data-folder="${escAttrQ(f.id)}" draggable="true">
            <div class="folder-head">
              <span class="drag-dots folder-drag" title="Drag to reorder">⠿</span>
              <input class="folder-name-input" value="${escAttrQ(f.name)}" data-folder="${escAttrQ(f.id)}" placeholder="${vol ? 'e.g. Volume One' : 'Folder name'}" />
              <span class="folder-count">${lessons.length}</span>
              <button class="icon-btn" data-act="del-folder" data-folder="${escAttrQ(f.id)}" title="Delete">✕</button>
            </div>
            <div class="folder-meta">
              <button class="mini-btn" data-act="new-lesson" data-folder="${escAttrQ(f.id)}">+ ${itemWord}</button>
            </div>
            <div class="folder-lessons" data-folder="${escAttrQ(f.id)}">${rows}</div>
          </div>`;
        }).join('');
      }
      panel.innerHTML = html;
      wireFolderManager(panel);
    }

    function wireFolderManager(list) {
      list.querySelectorAll('#layoutSeg button').forEach(btn => btn.addEventListener('click', () => {
        DATA.layouts = DATA.layouts || {};
        DATA.layouts[navArea + ':' + navSub] = btn.dataset.layout;
        list.querySelectorAll('#layoutSeg button').forEach(b => b.classList.toggle('active', b === btn));
        commit();
      }));

      const nf = list.querySelector('#btnNewFolder');
      if (nf) nf.addEventListener('click', () => {
        const folder = newFolderTemplate();
        DATA.folders.push(folder); commit(); renderNav();
        const inp = document.querySelector('.folder[data-folder="' + folder.id + '"] .folder-name-input');
        if (inp) { inp.focus(); inp.select(); }
      });

      list.querySelectorAll('.admin-lesson').forEach(el => {
        el.addEventListener('click', () => { selectedLessonId = el.dataset.lesson; renderAdmin(); });
        el.addEventListener('dragstart', e => {
          dragData = { type: 'lesson', id: el.dataset.lesson, from: el.dataset.folder };
          e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', el.dataset.lesson); e.stopPropagation();
        });
        el.addEventListener('dragover', e => { if (dragData && dragData.type === 'lesson') { e.preventDefault(); e.stopPropagation(); el.classList.add('drag-over'); } });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
          el.classList.remove('drag-over');
          if (dragData && dragData.type === 'lesson') { e.preventDefault(); e.stopPropagation(); moveLesson(dragData.id, el.dataset.folder, el.dataset.lesson); }
        });
      });

      list.querySelectorAll('.folder-lessons').forEach(zone => {
        zone.addEventListener('dragover', e => { if (dragData && dragData.type === 'lesson') e.preventDefault(); });
        zone.addEventListener('drop', e => {
          if (dragData && dragData.type === 'lesson') { e.preventDefault(); e.stopPropagation(); moveLesson(dragData.id, zone.dataset.folder, null); }
        });
      });

      list.querySelectorAll('.folder').forEach(fEl => {
        fEl.addEventListener('dragstart', e => {
          if (e.target.closest('.admin-lesson')) return;
          if (e.target.closest('input,select,button')) { e.preventDefault(); return; }
          dragData = { type: 'folder', id: fEl.dataset.folder };
          e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', fEl.dataset.folder);
        });
        fEl.addEventListener('dragover', e => {
          if (!dragData) return;
          if (dragData.type === 'folder' && dragData.id !== fEl.dataset.folder) { e.preventDefault(); fEl.classList.add('drag-over'); }
          else if (dragData.type === 'lesson') e.preventDefault();
        });
        fEl.addEventListener('dragleave', () => fEl.classList.remove('drag-over'));
        fEl.addEventListener('drop', e => {
          fEl.classList.remove('drag-over');
          if (!dragData) return;
          if (dragData.type === 'folder')      { e.preventDefault(); moveFolder(dragData.id, fEl.dataset.folder); }
          else if (dragData.type === 'lesson') { e.preventDefault(); moveLesson(dragData.id, fEl.dataset.folder, null); }
        });
      });

      list.querySelectorAll('.folder-name-input').forEach(inp => {
        inp.addEventListener('input', () => { const f = DATA.folders.find(x => x.id === inp.dataset.folder); if (f) { f.name = inp.value; commit(); } });
        inp.addEventListener('mousedown', e => e.stopPropagation());
      });
      list.querySelectorAll('[data-act="del-folder"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const f = DATA.folders.find(x => x.id === btn.dataset.folder);
          if (!f || !confirm(`Delete "${f.name}" and everything in it?`)) return;
          if ((f.lessons || []).some(l => l.id === selectedLessonId)) selectedLessonId = null;
          DATA.folders = DATA.folders.filter(x => x.id !== f.id);
          commit(); renderAdmin();
        });
      });
      list.querySelectorAll('[data-act="new-lesson"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const f = DATA.folders.find(x => x.id === btn.dataset.folder);
          if (!f) return;
          const lesson = { id: uid(), title: 'Untitled lesson', content: '', published: false, locked: false };
          (f.lessons = f.lessons || []).push(lesson);
          selectedLessonId = lesson.id;
          commit(); renderAdmin();
        });
      });
    }

    /* ── Scholars management (edited in the main pane) ───────────────── */

                <button class="icon-btn" data-act="del-scholar" title="Delete">✕</button>

              <textarea class="sc-desc" rows="2" placeholder="Description / dates (new lines allowed)">${escHTML(s.desc || '')}</textarea>
            </div>
          </div>`).join('') +
        `</div>`;

      main.querySelector('#btnNewScholar').addEventListener('click', () => {
        DATA.scholars.push({ id: uid(), name: 'New Scholar', initials: '', desc: '' });
        commit(); renderScholarsManager(main);
      });
      main.querySelectorAll('.sc-card').forEach(card => {
        const s = DATA.scholars.find(x => x.id === card.dataset.scholar);
        if (!s) return;
        card.querySelector('.sc-name').addEventListener('input', e => { s.name = e.target.value; commit(); });
        card.querySelector('.sc-init').addEventListener('input', e => {
          s.initials = e.target.value; commit();
          card.querySelector('.sc-avatar').textContent = (s.initials || (s.name || '?')[0] || '?').toUpperCase();
        });
        card.querySelector('.sc-desc').addEventListener('input', e => { s.desc = e.target.value; commit(); });
        card.querySelector('[data-act="del-scholar"]').addEventListener('click', () => {
          if (!confirm(`Delete "${s.name}"?`)) return;
          DATA.scholars = DATA.scholars.filter(x => x.id !== s.id);
          commit(); renderScholarsManager(main);
        });
      });
    }

    function moveLesson(lessonId, toFolderId, beforeLessonId) {
      if (beforeLessonId === lessonId) return;
      const src = findLessonById(lessonId);
      const toFolder = DATA.folders.find(f => f.id === toFolderId);
      if (!src || !toFolder) return;
      const [lesson] = src.folder.lessons.splice(src.index, 1);
      toFolder.lessons = toFolder.lessons || [];
      let idx = toFolder.lessons.length;
      if (beforeLessonId) { const bi = toFolder.lessons.findIndex(l => l.id === beforeLessonId); if (bi >= 0) idx = bi; }
      toFolder.lessons.splice(idx, 0, lesson);
      commit(); renderNav();
    }

    function moveFolder(folderId, beforeFolderId) {
      if (folderId === beforeFolderId) return;
      const i = DATA.folders.findIndex(f => f.id === folderId);
      if (i < 0) return;
      const [folder] = DATA.folders.splice(i, 1);
      let idx = DATA.folders.length;
      if (beforeFolderId) { const bi = DATA.folders.findIndex(f => f.id === beforeFolderId); if (bi >= 0) idx = bi; }
      DATA.folders.splice(idx, 0, folder);
      commit(); renderNav();
    }

    /* ══════════════════════════════════════════════════════════════════
       QUESTIONS MANAGER — Categories → Folders → Lessons
    ══════════════════════════════════════════════════════════════════ */
    function arrMove(arr, id, beforeId) {
      if (id === beforeId) return;
      const i = arr.findIndex(x => x.id === id); if (i < 0) return;
      const [item] = arr.splice(i, 1);
      let idx = arr.length;
      if (beforeId) { const bi = arr.findIndex(x => x.id === beforeId); if (bi >= 0) idx = bi; }
      arr.splice(idx, 0, item);
    }

    function renderQuestionsManager(panel) {
      if (ensureQuestions()) commit();
      const cats = DATA.questions.categories;

      // ── Level 3: lessons inside a folder ──
      if (adminQCat && adminQFolder) {
        const cat = cats.find(c => c.id === adminQCat);
        const folder = cat && (cat.folders || []).find(f => f.id === adminQFolder);
        if (!folder) { adminQFolder = null; return renderQuestionsManager(panel); }
        const rows = (folder.lessons || []).map(l => {
          const tags = (l.published ? '' : '<span class="tag tag-draft">Draft</span>') + (l.locked ? '<span class="tag tag-locked">🔒</span>' : '');
          return `<div class="admin-lesson ${l.id === selectedLessonId ? 'selected' : ''}" draggable="true" data-qlesson="${escAttrQ(l.id)}">
                    <span class="drag-dots">⠿</span><span class="admin-lesson-title">${escHTML(l.title)}</span>${tags}</div>`;
        }).join('') || '<p class="folder-empty">No questions yet</p>';
        panel.innerHTML = `<button class="admin-btn primary block" id="btnNewQLesson">+ New Question</button>
          <div class="folder-lessons" id="qLessonZone">${rows}</div>`;
        panel.querySelector('#btnNewQLesson').addEventListener('click', () => {
          const lesson = { id: uid(), title: 'Untitled question', content: '', published: false, locked: false };
          (folder.lessons = folder.lessons || []).push(lesson);
          selectedLessonId = lesson.id; commit(); renderAdmin();
        });
        panel.querySelectorAll('.admin-lesson').forEach(el => {
          el.addEventListener('click', () => { selectedLessonId = el.dataset.qlesson; renderAdmin(); });
          el.addEventListener('dragstart', e => { dragData = { type: 'qlesson', id: el.dataset.qlesson }; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', el.dataset.qlesson); });
          el.addEventListener('dragover', e => { if (dragData && dragData.type === 'qlesson') { e.preventDefault(); el.classList.add('drag-over'); } });
          el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
          el.addEventListener('drop', e => { el.classList.remove('drag-over'); if (dragData && dragData.type === 'qlesson') { e.preventDefault(); arrMove(folder.lessons, dragData.id, el.dataset.qlesson); commit(); renderNav(); } });
        });
        return;
      }

      // ── Level 2: folders inside a category ──
      if (adminQCat) {
        const cat = cats.find(c => c.id === adminQCat);
        if (!cat) { adminQCat = null; return renderQuestionsManager(panel); }
        let html = `<button class="admin-btn primary block" id="btnNewQFolder">+ New Folder</button>`;
        html += (cat.folders || []).length ? (cat.folders.map(f => `

              <span class="drag-dots qf-drag" title="Drag to reorder">⠿</span>

        panel.innerHTML = html;
        panel.querySelector('#btnNewQFolder').addEventListener('click', () => {

        panel.querySelectorAll('[data-act="del-qfolder"]').forEach(b => b.addEventListener('click', () => {

        panel.querySelectorAll('.qf-row').forEach(row => {

          row.addEventListener('dragover', e => { if (dragData && dragData.type === 'qfolder' && dragData.id !== row.dataset.qfolder) { e.preventDefault(); row.classList.add('drag-over'); } });
          row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
          row.addEventListener('drop', e => { row.classList.remove('drag-over'); if (dragData && dragData.type === 'qfolder') { e.preventDefault(); arrMove(cat.folders, dragData.id, row.dataset.qfolder); commit(); renderNav(); } });
        });
        return;
      }

      // ── Level 1: categories ──
      let html = `<button class="admin-btn primary block" id="btnNewQCat">+ New Category</button>`;
      html += cats.length ? cats.map(c => `
        <div class="folder qc-row" data-qcat="${escAttrQ(c.id)}" draggable="true">
          <div class="folder-head">
            <span class="drag-dots qc-drag" title="Drag to reorder">⠿</span>

      panel.innerHTML = html;
      panel.querySelector('#btnNewQCat').addEventListener('click', () => {

      panel.querySelectorAll('.qc-name').forEach(inp => {

        inp.addEventListener('mousedown', e => e.stopPropagation());

      panel.querySelectorAll('[data-act="open-qcat"]').forEach(b => b.addEventListener('click', () => { adminQCat = b.dataset.qcat; adminQFolder = null; selectedLessonId = null; renderAdmin(); }));
      panel.querySelectorAll('[data-act="del-qcat"]').forEach(b => b.addEventListener('click', () => {

      panel.querySelectorAll('.qc-row').forEach(row => {
        row.addEventListener('dragstart', e => { if (e.target.closest('input,button')) { e.preventDefault(); return; } dragData = { type: 'qcat', id: row.dataset.qcat }; e.dataTransfer.effectAllowed = 'move'; });

      function buildSurface() {
        const design = effectiveDesign(l);

      btnSection.addEventListener('mousedown', e => e.preventDefault());
      btnSection.addEventListener('click', () => insertComponent(sectionBoxHTML()));

      document.querySelectorAll('#secSwatches .sec-swatch').forEach(sw => {

        if (!confirm(`Delete lesson "${l.title}"?`)) return;
        found.folder.lessons.splice(found.index, 1);
        selectedLessonId = null; commit(); renderAdmin();
        activeRich = null; activeRichSync = null;

    /* ── component blocks: ayah box & section box ───────────────────── */
    const SEC_COLORS = [
      { key: 'yellow', css: '#fef9c3' }, { key: 'mint', css: '#d1fae5' },
      { key: 'blue', css: '#e0f2fe' },   { key: 'pink', css: '#fce7f3' },
      { key: 'peach', css: '#ffedd5' }
    ];
    function secSwatchHTML() {
      return SEC_COLORS.map(c =>
        `<button type="button" class="sec-swatch" data-sec="${c.key}" title="${c.key} section" style="background:${c.css}"></button>`

    function ayahBoxHTML() {
      return '<div class="ayah-box"><div class="ayah-content">' +
             '<div class="ayah-arabic" dir="rtl" lang="ar"></div>' +
             '<div class="ayah-trans"></div></div></div>';

    function sectionBoxHTML() {
      return '<div class="section-box section-bg-yellow"><div class="section-pill">Section title</div>' +
             '<div class="section-body"><p><br></p></div></div>';

    /* contenteditable=false frame, contenteditable=true editable parts, + delete button */
    function enhanceComponents(root) {
      root.querySelectorAll('.ayah-box, .section-box').forEach(b => {
        b.setAttribute('contenteditable', 'false');
        if (!b.querySelector(':scope > .comp-del')) {
          const del = document.createElement('button');
          del.type = 'button';
          del.className = 'comp-del';
          del.setAttribute('contenteditable', 'false');
          del.title = b.classList.contains('ayah-box') ? 'Delete ayah box' : 'Delete section';
          del.textContent = '✕';
          b.appendChild(del);
        }
      });
      root.querySelectorAll('.ayah-arabic, .ayah-trans, .section-pill, .section-body').forEach(p => p.setAttribute('contenteditable', 'true'));
    }
    function insertComponent(html) {
      const ec = activeRich; if (!ec) return;
      ec.focus();
      const sel = window.getSelection();
      let range;
      if (sel && sel.rangeCount && ec.contains(sel.getRangeAt(0).commonAncestorContainer)) range = sel.getRangeAt(0);
      else { range = document.createRange(); range.selectNodeContents(ec); range.collapse(false); }
      range.deleteContents();
      const tpl = document.createElement('div'); tpl.innerHTML = html.trim();
      const node = tpl.firstElementChild;
      range.insertNode(node);
      // a trailing empty paragraph so the caret can leave the block
      const after = document.createElement('p'); after.appendChild(document.createElement('br'));
      if (node.parentNode) node.parentNode.insertBefore(after, node.nextSibling);
      enhanceComponents(ec);
      const field = node.querySelector('.ayah-arabic, .section-pill, .section-body');
      if (field) { const r = document.createRange(); r.selectNodeContents(field); r.collapse(true); sel.removeAllRanges(); sel.addRange(r); }
      if (activeRichSync) activeRichSync();
    }
    function setSectionColor(key) {
      const ec = activeRich; if (!ec) return;
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      let node = sel.getRangeAt(0).commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentNode;
      const sec = node.closest ? node.closest('.section-box') : null;
      if (!sec) { alert('Click inside a section first, then pick a colour.'); return; }
      sec.className = 'section-box section-bg-' + key;
      if (activeRichSync) activeRichSync();
    }

      a.href = url; a.download = 'data.json';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
